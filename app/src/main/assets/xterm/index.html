<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>pdocker terminal</title>
<link rel="stylesheet" href="xterm.css">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #050505;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  #term {
    flex: 1 1 auto;
    min-height: 0;
    position: relative;
    touch-action: none;
  }
  .xterm {
    height: 100%;
  }
  .xterm-viewport {
    overflow-y: auto;
  }
  #keybar {
    flex: 0 0 auto;
    display: flex;
    gap: 4px;
    align-items: center;
    overflow-x: auto;
    padding: 5px 6px calc(5px + env(safe-area-inset-bottom));
    background: #151515;
    border-top: 1px solid #303030;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  #keybar::-webkit-scrollbar {
    display: none;
  }
  body.readonly-log #keybar {
    display: none;
  }
  .key {
    flex: 0 0 auto;
    min-width: 42px;
    height: 32px;
    padding: 0 10px;
    border: 1px solid #3a3a3a;
    border-radius: 5px;
    background: #232323;
    color: #eeeeee;
    font: 12px/1.1 system-ui, sans-serif;
    white-space: nowrap;
  }
  .key.compact {
    min-width: 34px;
    padding: 0 8px;
  }
  .key.toggle.active {
    background: #0e5f9d;
    border-color: #58a6ff;
    color: #ffffff;
  }
  .key:active {
    background: #444444;
  }
  .selection-handle {
    position: absolute;
    z-index: 20;
    width: 14px;
    height: 14px;
    margin-left: -7px;
    margin-top: -7px;
    border: 2px solid #ffffff;
    border-radius: 50%;
    background: #0e5f9d;
    box-shadow: 0 0 0 2px rgba(14, 95, 157, 0.35);
    pointer-events: auto;
    display: none;
    touch-action: none;
  }
  .selection-handle.active {
    display: block;
  }
  .selection-status {
    position: absolute;
    left: 8px;
    bottom: 8px;
    z-index: 19;
    padding: 3px 7px;
    border-radius: 5px;
    background: rgba(14, 95, 157, 0.92);
    color: #ffffff;
    font: 11px/1.2 system-ui, sans-serif;
    pointer-events: none;
    display: none;
  }
  .selection-status.active {
    display: block;
  }
  .selection-menu {
    position: absolute;
    right: 8px;
    bottom: 32px;
    z-index: 21;
    display: none;
    gap: 4px;
    padding: 4px;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    background: rgba(18, 18, 18, 0.96);
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
  }
  .selection-menu.active {
    display: flex;
  }
  .selection-menu button {
    min-width: 48px;
    height: 30px;
    border: 1px solid #3a3a3a;
    border-radius: 5px;
    background: #232323;
    color: #eeeeee;
    font: 12px/1.1 system-ui, sans-serif;
  }
</style>
</head>
<body>
<div id="term">
  <div id="selectionStart" class="selection-handle"></div>
  <div id="selectionEnd" class="selection-handle"></div>
  <div id="selectionStatus" class="selection-status">selection</div>
  <div id="selectionMenu" class="selection-menu" aria-label="selection menu">
    <button data-selection-action="all">All</button>
    <button data-selection-action="copy">Copy</button>
    <button data-selection-action="clear">Clear</button>
  </div>
</div>
<div id="keybar" aria-label="terminal shortcut keys">
  <button class="key toggle compact" data-toggle="select">Sel</button>
  <button class="key compact" data-select-all="1">All</button>
  <button class="key compact" data-copy="1">Copy</button>
  <button class="key toggle compact" data-toggle="esc">Esc</button>
  <button class="key toggle compact" data-toggle="ctrl">Ctrl</button>
  <button class="key toggle compact" data-toggle="alt">Alt</button>
  <button class="key compact" data-key="\t">Tab</button>
  <button class="key compact" data-key="\r">Enter</button>
  <button class="key compact" data-key="\u007f">Bksp</button>
  <button class="key compact" data-key="\u001b[D">←</button>
  <button class="key compact" data-key="\u001b[B">↓</button>
  <button class="key compact" data-key="\u001b[A">↑</button>
  <button class="key compact" data-key="\u001b[C">→</button>
  <button class="key" data-key="\u001b[H">Home</button>
  <button class="key" data-key="\u001b[F">End</button>
  <button class="key" data-key="\u001b[3~">Del</button>
  <button class="key" data-key="\u001b[5~">PgUp</button>
  <button class="key" data-key="\u001b[6~">PgDn</button>
  <button class="key" data-key="\u0003" data-raw="1">Ctrl-C</button>
  <button class="key" data-key="\u0004" data-raw="1">Ctrl-D</button>
  <button class="key" data-key="\u001a" data-raw="1">Ctrl-Z</button>
  <button class="key" data-key="\u000c" data-raw="1">Ctrl-L</button>
  <button class="key compact" data-key="|">|</button>
  <button class="key compact" data-key="~">~</button>
  <button class="key compact" data-key="/">/</button>
  <button class="key compact" data-key="-">-</button>
</div>
<script src="xterm.js"></script>
<script src="xterm-addon-fit.js"></script>
<script>
  const readOnly = !!(window.PdockerBridge && PdockerBridge.readOnly && PdockerBridge.readOnly());
  const initialFontSize = readOnly ? 8 : 12;
  const term = new Terminal({
    termName: 'xterm-256color',
    fontFamily: '"Noto Sans Mono CJK JP","Droid Sans Mono","Roboto Mono",monospace',
    fontSize: initialFontSize,
    lineHeight: 1.22,
    letterSpacing: 0,
    cursorBlink: true,
    cursorStyle: 'block',
    scrollback: 4000,
    convertEol: false,
    drawBoldTextInBrightColors: true,
    rightClickSelectsWord: true,
    scrollOnUserInput: true,
    tabStopWidth: 8,
    theme: {
      selectionBackground: '#2f7edb',
      selectionForeground: '#ffffff'
    }
  });
  const fit = new FitAddon.FitAddon();
  term.loadAddon(fit);
  term.open(document.getElementById('term'));
  fit.fit();

  const enc = new TextEncoder();
  const dec = new TextDecoder('utf-8', { fatal: false });
  const toB64 = (bytes) => {
    let s = '';
    for (const b of bytes) s += String.fromCharCode(b);
    return btoa(s);
  };
  const fromB64 = (b64) => {
    const s = atob(b64);
    const out = new Uint8Array(s.length);
    for (let i = 0; i < s.length; i++) out[i] = s.charCodeAt(i);
    return out;
  };

  const mods = { esc: false, ctrl: false, alt: false, select: false };
  const keybar = document.getElementById('keybar');
  const termHost = document.getElementById('term');
  if (readOnly) {
    document.body.classList.add('readonly-log');
    term.options.disableStdin = true;
  }
  const startHandle = document.getElementById('selectionStart');
  const endHandle = document.getElementById('selectionEnd');
  const selectionStatus = document.getElementById('selectionStatus');
  const selectionMenu = document.getElementById('selectionMenu');
  let fontSize = initialFontSize;
  let pinch = null;
  let longPressTimer = null;
  let selectionStartCell = null;
  let selectionEndCell = null;
  let selectionActive = false;
  let selectionDrag = null;
  let touchScroll = null;
  let allSelected = false;
  const touchScrollThreshold = 6;

  const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
  const distance = (a, b) => Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
  const viewportY = () => term.buffer && term.buffer.active ? term.buffer.active.viewportY : 0;
  const setFontSize = (value) => {
    fontSize = clamp(Math.round(value * 10) / 10, 8, 24);
    term.options.fontSize = fontSize;
    pushResize();
  };
  const screenRect = () => {
    const screen = termHost.querySelector('.xterm-screen canvas') || termHost.querySelector('.xterm-screen') || termHost;
    return screen.getBoundingClientRect();
  };
  const viewportEl = () => termHost.querySelector('.xterm-viewport');
  const cellFromTouch = (touch) => {
    const rect = screenRect();
    const cellWidth = rect.width / Math.max(term.cols, 1);
    const cellHeight = rect.height / Math.max(term.rows, 1);
    const visibleY = clamp(Math.floor((touch.clientY - rect.top) / cellHeight), 0, Math.max(term.rows - 1, 0));
    return {
      x: clamp(Math.floor((touch.clientX - rect.left) / cellWidth), 0, Math.max(term.cols - 1, 0)),
      y: viewportY() + visibleY
    };
  };
  const cellToPoint = (cell) => {
    const rect = screenRect();
    const cellWidth = rect.width / Math.max(term.cols, 1);
    const cellHeight = rect.height / Math.max(term.rows, 1);
    const hostRect = termHost.getBoundingClientRect();
    const visibleY = cell.y - viewportY();
    return {
      left: rect.left - hostRect.left + (cell.x + 0.5) * cellWidth,
      top: rect.top - hostRect.top + (visibleY + 1) * cellHeight
    };
  };
  const orderedSelection = () => {
    if (!selectionStartCell || !selectionEndCell) return null;
    const a = selectionStartCell;
    const b = selectionEndCell;
    const aIndex = a.y * term.cols + a.x;
    const bIndex = b.y * term.cols + b.x;
    return aIndex <= bIndex ? { start: a, end: b } : { start: b, end: a };
  };
  const sameCell = (a, b) => !!a && !!b && a.x === b.x && a.y === b.y;
  const roleForVisualHandle = (visual) => {
    const ordered = orderedSelection();
    if (!ordered) return visual === 'start' ? 'start' : 'end';
    if (visual === 'start') return sameCell(ordered.start, selectionStartCell) ? 'start' : 'end';
    return sameCell(ordered.end, selectionStartCell) ? 'start' : 'end';
  };
  const refreshSelectionMarkers = () => {
    const ordered = orderedSelection();
    const active = selectionActive && ordered;
    [startHandle, endHandle, selectionStatus, selectionMenu].forEach((el) => el.classList.toggle('active', !!active));
    if (!active) return;
    const start = cellToPoint(ordered.start);
    const end = cellToPoint(ordered.end);
    startHandle.style.left = `${start.left}px`;
    startHandle.style.top = `${start.top}px`;
    endHandle.style.left = `${end.left}px`;
    endHandle.style.top = `${end.top}px`;
    selectionStatus.textContent = allSelected
      ? 'all selected'
      : `${ordered.start.y + 1}:${ordered.start.x + 1} - ${ordered.end.y + 1}:${ordered.end.x + 1}`;
  };
  const applyTerminalSelection = () => {
    const ordered = orderedSelection();
    if (!ordered) return;
    allSelected = false;
    const length = (ordered.end.y - ordered.start.y) * term.cols + (ordered.end.x - ordered.start.x) + 1;
    term.select(ordered.start.x, ordered.start.y, Math.max(length, 1));
    refreshSelectionMarkers();
  };
  const selectionSuppressesIme = () => selectionActive || mods.select || !!selectionDrag;
  const helperTextarea = () => document.querySelector('.xterm-helper-textarea');
  const suppressImeForSelection = () => {
    const ta = helperTextarea();
    if (!ta) return;
    ta.setAttribute('readonly', 'readonly');
    ta.setAttribute('inputmode', 'none');
    ta.blur();
  };
  const startSelection = (cell) => {
    selectionActive = true;
    mods.select = true;
    allSelected = false;
    selectionStartCell = cell;
    selectionEndCell = cell;
    selectionDrag = 'end';
    refreshModifiers();
    applyTerminalSelection();
    suppressImeForSelection();
  };
  const updateSelection = (cell, handle = selectionDrag || 'end') => {
    if (!selectionActive) return;
    if (handle === 'start') selectionStartCell = cell;
    else selectionEndCell = cell;
    applyTerminalSelection();
    suppressImeForSelection();
  };
  const selectAllTerminal = () => {
    selectionActive = true;
    mods.select = true;
    allSelected = true;
    selectionStartCell = { x: 0, y: viewportY() };
    selectionEndCell = { x: Math.max(term.cols - 1, 0), y: viewportY() + Math.max(term.rows - 1, 0) };
    refreshModifiers();
    term.selectAll();
    refreshSelectionMarkers();
    suppressImeForSelection();
  };
  const stopSelection = () => {
    selectionActive = false;
    mods.select = false;
    selectionDrag = null;
    allSelected = false;
    term.clearSelection();
    refreshModifiers();
    refreshSelectionMarkers();
  };
  const copySelection = () => {
    const text = term.getSelection();
    if (!text) return;
    if (window.PdockerBridge && PdockerBridge.copyToClipboard) {
      PdockerBridge.copyToClipboard(toB64(enc.encode(text)));
      return;
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).catch(() => {});
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }
  };
  const runSelectionAction = (action) => {
    if (action === 'all') selectAllTerminal();
    if (action === 'copy') copySelection();
    if (action === 'clear') stopSelection();
    if (readOnly || selectionSuppressesIme()) suppressImeForSelection();
  };
  const ctrlMap = (ch) => {
    if (ch.length !== 1) return ch;
    const code = ch.codePointAt(0);
    if (code >= 0x61 && code <= 0x7a) return String.fromCharCode(code - 0x60);
    if (code >= 0x41 && code <= 0x5a) return String.fromCharCode(code - 0x40);
    switch (ch) {
      case ' ': return '\x00';
      case '[': return '\x1b';
      case '\\': return '\x1c';
      case ']': return '\x1d';
      case '^': return '\x1e';
      case '_': return '\x1f';
      case '?': return '\x7f';
      default: return ch;
    }
  };
  const applyModifiers = (data) => {
    let out = data;
    if (mods.ctrl && data.length === 1) out = ctrlMap(data);
    if (mods.alt || mods.esc) out = '\x1b' + out;
    return out;
  };
  const normalizeTerminalInput = (data) => {
    if (data == null) return '';
    return data.replace(/\r\n/g, '\r').replace(/\n/g, '\r');
  };
  const clearTransientModifiers = () => {
    if (!mods.ctrl && !mods.alt && !mods.esc) return;
    mods.ctrl = false;
    mods.alt = false;
    mods.esc = false;
    refreshModifiers();
  };
  const decodeKey = (value) => {
    if (value == null) return '';
    return value
      .replace(/\\t/g, '\t')
      .replace(/\\r/g, '\r')
      .replace(/\\n/g, '\n')
      .replace(/\\u([0-9a-fA-F]{4})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)));
  };
  const refreshModifiers = () => {
    keybar.querySelectorAll('[data-toggle]').forEach((btn) => {
      btn.classList.toggle('active', !!mods[btn.dataset.toggle]);
    });
  };
  const focusTerm = () => {
    if (readOnly) return;
    if (selectionSuppressesIme()) {
      suppressImeForSelection();
      return;
    }
    term.focus();
    tuneIme();
  };
  const sendInput = (data, raw = false) => {
    if (readOnly) return;
    const normalized = normalizeTerminalInput(data);
    const payload = raw ? normalized : applyModifiers(normalized);
    if (!payload) return;
    PdockerBridge.input(toB64(enc.encode(payload)));
    clearTransientModifiers();
  };
  window.pdockerTestSendInput = sendInput;
  window.pdockerTestCtrlInput = (data) => {
    mods.ctrl = true;
    refreshModifiers();
    sendInput(data, false);
    return !!mods.ctrl;
  };

  if (!readOnly) {
    term.onData((data) => {
      sendInput(data);
    });
  }

  keybar.addEventListener('click', (event) => {
    const btn = event.target.closest('button');
    if (!btn) return;
    event.preventDefault();
    if (btn.dataset.copy) {
      runSelectionAction('copy');
      focusTerm();
      return;
    }
    if (btn.dataset.selectAll) {
      runSelectionAction('all');
      focusTerm();
      return;
    }
    if (btn.dataset.toggle) {
      mods[btn.dataset.toggle] = !mods[btn.dataset.toggle];
      if (btn.dataset.toggle === 'select') {
        if (mods.select) {
          const mid = { x: Math.floor(term.cols / 2), y: Math.floor(term.rows / 2) };
          startSelection(mid);
        } else {
          stopSelection();
        }
      }
      refreshModifiers();
      focusTerm();
      return;
    }
    if (btn.dataset.key != null) {
      sendInput(decodeKey(btn.dataset.key), btn.dataset.raw === '1');
      focusTerm();
    }
  });

  selectionMenu.addEventListener('click', (event) => {
    const btn = event.target.closest('button');
    if (!btn) return;
    event.stopPropagation();
    event.preventDefault();
    const action = btn.dataset.selectionAction;
    runSelectionAction(action);
    focusTerm();
  });
  ['touchstart', 'touchmove', 'touchend', 'touchcancel'].forEach((name) => {
    selectionMenu.addEventListener(name, (event) => {
      event.stopPropagation();
    }, { passive: false });
  });

  const isNearBottom = () => {
    const buffer = term.buffer && term.buffer.active;
    if (!buffer) return true;
    return (buffer.baseY - buffer.viewportY) <= 1;
  };
  window.pdockerRecv = (b64) => {
    const followTail = readOnly ? !selectionActive : isNearBottom();
    term.write(dec.decode(fromB64(b64), { stream: true }), () => {
      if (followTail) term.scrollToBottom();
      refreshSelectionMarkers();
    });
  };

  const pushResize = () => {
    fit.fit();
    PdockerBridge.resize(term.rows, term.cols);
    refreshSelectionMarkers();
  };
  window.addEventListener('resize', pushResize);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', pushResize);
  }

  const tuneIme = () => {
    const ta = helperTextarea();
    if (!ta) return;
    ta.setAttribute('autocomplete', 'off');
    ta.setAttribute('autocorrect', 'off');
    ta.setAttribute('autocapitalize', 'off');
    ta.setAttribute('spellcheck', 'false');
    if (readOnly || selectionSuppressesIme()) {
      ta.setAttribute('readonly', 'readonly');
      if (readOnly) ta.setAttribute('disabled', 'disabled');
      else ta.removeAttribute('disabled');
      ta.setAttribute('inputmode', 'none');
      ta.blur();
    } else {
      ta.removeAttribute('readonly');
      ta.removeAttribute('disabled');
      ta.setAttribute('inputmode', 'text');
    }
  };

  termHost.addEventListener('touchstart', (event) => {
    if (event.touches.length === 2) {
      clearTimeout(longPressTimer);
      touchScroll = null;
      selectionDrag = null;
      pinch = {
        distance: distance(event.touches[0], event.touches[1]),
        fontSize
      };
      event.preventDefault();
      return;
    }
    if (event.touches.length !== 1) return;
    if (selectionMenu.contains(event.target)) return;
    if (readOnly) suppressImeForSelection();
    const touch = event.touches[0];
    const cell = cellFromTouch(touch);
    const handleEl = event.target.closest ? event.target.closest('.selection-handle') : null;
    if (handleEl === startHandle || handleEl === endHandle) {
      touchScroll = null;
      selectionDrag = roleForVisualHandle(handleEl === startHandle ? 'start' : 'end');
      suppressImeForSelection();
      event.preventDefault();
      return;
    }
    touchScroll = {
      x: touch.clientX,
      y: touch.clientY,
      lastY: touch.clientY,
      active: false
    };
    clearTimeout(longPressTimer);
    longPressTimer = setTimeout(() => {
      if (touchScroll && !touchScroll.active) {
        touchScroll = null;
        startSelection(cell);
      }
    }, 460);
  }, { passive: false });

  termHost.addEventListener('touchmove', (event) => {
    if (event.touches.length === 2 && pinch) {
      const ratio = distance(event.touches[0], event.touches[1]) / Math.max(pinch.distance, 1);
      setFontSize(pinch.fontSize * ratio);
      event.preventDefault();
      return;
    }
    if (event.touches.length === 1 && selectionActive && selectionDrag) {
      updateSelection(cellFromTouch(event.touches[0]), selectionDrag || 'end');
      event.preventDefault();
      return;
    }
    if (event.touches.length === 1 && touchScroll) {
      const touch = event.touches[0];
      const moved = Math.hypot(touch.clientX - touchScroll.x, touch.clientY - touchScroll.y);
      if (moved > touchScrollThreshold) {
        clearTimeout(longPressTimer);
        touchScroll.active = true;
      }
      if (touchScroll.active) {
        const deltaY = touch.clientY - touchScroll.lastY;
        const viewport = viewportEl();
        if (viewport) {
          viewport.scrollTop -= deltaY;
        } else {
          const rect = screenRect();
          const cellHeight = rect.height / Math.max(term.rows, 1);
          const lines = Math.trunc(deltaY / Math.max(cellHeight, 1));
          if (lines !== 0) term.scrollLines(-lines);
        }
        touchScroll.lastY = touch.clientY;
        refreshSelectionMarkers();
        event.preventDefault();
        return;
      }
    }
  }, { passive: false });

  termHost.addEventListener('touchend', (event) => {
    clearTimeout(longPressTimer);
    if (event.touches.length < 2) pinch = null;
    if (event.touches.length === 0) touchScroll = null;
    if (event.touches.length === 0) selectionDrag = null;
    if (!readOnly && !selectionActive && event.touches.length === 0) focusTerm();
  }, { passive: false });

  termHost.addEventListener('touchcancel', () => {
    clearTimeout(longPressTimer);
    pinch = null;
    touchScroll = null;
    selectionDrag = null;
  }, { passive: false });

  const viewport = viewportEl();
  if (viewport) {
    viewport.addEventListener('scroll', refreshSelectionMarkers, { passive: true });
  }

  termHost.addEventListener('contextmenu', (event) => {
    event.preventDefault();
    if (!selectionActive) {
      startSelection(cellFromTouch(event));
    }
    refreshSelectionMarkers();
  });

  document.addEventListener('keydown', (event) => {
    if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'a') {
      event.preventDefault();
      selectAllTerminal();
    }
  }, true);

  if (!readOnly) {
    PdockerBridge.startInitial();
    term.focus();
  }
  setTimeout(() => { tuneIme(); pushResize(); }, 100);
  setTimeout(pushResize, 500);
</script>
</body>
</html>
