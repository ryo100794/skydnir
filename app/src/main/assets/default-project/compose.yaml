# skydnir.service-url: 18080=VS Code
# skydnir.auto-open: VS Code
services:
  dev:
    build:
      context: .
      args:
        CODE_SERVER_VERSION: latest
        CODEX_NPM_PACKAGE: "@openai/codex"
        CLAUDE_CODE_NPM_PACKAGE: "@anthropic-ai/claude-code"
    image: skydnir/dev-workspace:latest
    container_name: skydnir-dev
    gpus: all
    working_dir: /workspace
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      CODE_SERVER_PASSWORD: "${CODE_SERVER_PASSWORD:-}"
      CODE_SERVER_PORT: "${CODE_SERVER_PORT:-18080}"
      PDOCKER_GPU: "1"
      PDOCKER_WORKSPACE_DIR: "/workspace"
      PDOCKER_PROJECT_DIR: "/pdocker/project"
      PDOCKER_PROJECTS_DIR: "/pdocker/projects"
      PDOCKER_HOME: "/pdocker/host"
      PDOCKER_ENGINE_SOCKET: "/pdocker/host/pdockerd.sock"
      PDOCKER_DOCUMENTS_MOUNT: "${PDOCKER_DOCUMENTS_MOUNT:-/documents}"
      PDOCKER_SHARED_DOCUMENTS_MOUNT: "${PDOCKER_SHARED_DOCUMENTS_MOUNT:-/shared}"
      PDOCKER_EXPORT_DIR: "${PDOCKER_EXPORT_DIR:-/documents/skydnir-exports}"
      PDOCKER_FAST_WORKDIR: "${PDOCKER_FAST_WORKDIR:-/workspace}"
    command: ["/usr/local/bin/start-code-server"]
    ports:
      - "18080:18080"
    volumes:
      - ${PDOCKER_FAST_WORKSPACE_HOST:-./workspace}:/workspace
      - ${PDOCKER_DEV_STATE_HOST:-./state/dev}/continue:/workspace/.continue
      - ${PDOCKER_DEV_STATE_HOST:-./state/dev}/vscode:/workspace/.vscode-server/data/User
      - ${PDOCKER_DOCUMENTS_HOST:-./documents}:${PDOCKER_DOCUMENTS_MOUNT:-/documents}
      - ${PDOCKER_SHARED_DOCUMENTS_HOST:-./shared-documents}:${PDOCKER_SHARED_DOCUMENTS_MOUNT:-/shared}
      - .:/pdocker/project
      - ..:/pdocker/projects
      - ../..:/pdocker/host
