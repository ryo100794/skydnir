# skydnir.service-url: 18081=llama.cpp
services:
  llama-cpp:
    build:
      context: .
      args:
        LLAMA_CPP_REF: "${LLAMA_CPP_REF:-b9030}"
        LLAMA_CPP_BUILD_JOBS: "${LLAMA_CPP_BUILD_JOBS:-1}"
        LLAMA_CPP_BUILD_TYPE: "${LLAMA_CPP_BUILD_TYPE:-Release}"
    image: pdocker/llama-cpp-gpu:latest
    container_name: pdocker-llama-cpp
    gpus: all
    working_dir: /workspace
    environment:
      PDOCKER_GPU: "auto"
      PDOCKER_GPU_AUTO: "1"
      PDOCKER_GPU_MODE: "${PDOCKER_GPU_MODE:-vulkan-raw}"
      LLAMA_ARG_MODEL: "${LLAMA_ARG_MODEL:-/models/model.gguf}"
      LLAMA_ARG_CTX: "${LLAMA_ARG_CTX:-4096}"
      LLAMA_ARG_PORT: "${LLAMA_ARG_PORT:-18081}"
      LLAMA_ARG_THREADS: "${LLAMA_ARG_THREADS:-}"
      LLAMA_ARG_N_GPU_LAYERS: "${LLAMA_ARG_N_GPU_LAYERS:-1}"
      # pdocker.llama-gpu-env-manifest: begin ui_compose_runtime_env_defaults
      PDOCKER_GPU_DISABLE_PIPELINE_OPTIMIZATION: "${PDOCKER_GPU_DISABLE_PIPELINE_OPTIMIZATION:-0}"
      PDOCKER_VULKAN_MAX_BUFFER_BYTES: "${PDOCKER_VULKAN_MAX_BUFFER_BYTES:-536870912}"
      GGML_VK_FORCE_MAX_BUFFER_SIZE: "${GGML_VK_FORCE_MAX_BUFFER_SIZE:-536870912}"
      GGML_VK_FORCE_MAX_ALLOCATION_SIZE: "${GGML_VK_FORCE_MAX_ALLOCATION_SIZE:-536870912}"
      GGML_VK_SUBALLOCATION_BLOCK_SIZE: "${GGML_VK_SUBALLOCATION_BLOCK_SIZE:-536870912}"
      # pdocker.llama-gpu-env-manifest: end
      PDOCKER_VULKAN_ALLOW_KV_OFFLOAD: "${PDOCKER_VULKAN_ALLOW_KV_OFFLOAD:-0}"
      LLAMA_GPU_PROFILE_REFRESH: "${LLAMA_GPU_PROFILE_REFRESH:-auto}"
      LLAMA_EXTRA_ARGS: "${LLAMA_EXTRA_ARGS:---path /opt/llama.cpp/tools/server/public --jinja}"
      LLAMA_LOG_FILE: "${LLAMA_LOG_FILE:-/workspace/logs/llama-server.log}"
      LLAMA_CORRECTNESS_FILE: "${LLAMA_CORRECTNESS_FILE:-/workspace/logs/pdocker-llama-correctness.json}"
      LLAMA_MODEL_URL: "${LLAMA_MODEL_URL:-https://huggingface.co/Qwen/Qwen3-8B-GGUF/resolve/main/Qwen3-8B-Q4_K_M.gguf}"
      PDOCKER_DOCUMENTS_MOUNT: "${PDOCKER_DOCUMENTS_MOUNT:-/documents}"
      PDOCKER_SHARED_DOCUMENTS_MOUNT: "${PDOCKER_SHARED_DOCUMENTS_MOUNT:-/shared}"
      PDOCKER_EXPORT_DIR: "${PDOCKER_EXPORT_DIR:-/documents/pdocker-exports}"
      PDOCKER_FAST_WORKDIR: "${PDOCKER_FAST_WORKDIR:-/workspace}"
    command: ["/usr/local/bin/start-llama-server"]
    ports:
      - "18081:18081"
    volumes:
      - ${PDOCKER_MODEL_HOST:-./models}:/models
      - ${PDOCKER_FAST_WORKSPACE_HOST:-./workspace}:/workspace
      - ./profiles:/profiles
      - ${PDOCKER_DOCUMENTS_HOST:-./documents}:${PDOCKER_DOCUMENTS_MOUNT:-/documents}
      - ${PDOCKER_SHARED_DOCUMENTS_HOST:-./shared-documents}:${PDOCKER_SHARED_DOCUMENTS_MOUNT:-/shared}
