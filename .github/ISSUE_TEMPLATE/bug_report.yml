name: Bug report
description: Report a reproducible pdocker-android bug.
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing pdocker-android. Please remove tokens, passwords,
        API keys, cookies, and private paths from logs before posting.

        Current baseline: build 20260505.1 is committed at dd3ce31. The APK
        device full smoke passed; host backend regression and literal
        test-density blockers are still open unless a newer record says
        otherwise.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: APK version, release tag, or commit SHA.
      placeholder: "20260505.1 / dd3ce31 / local build"
    validations:
      required: true
  - type: dropdown
    id: flavor
    attributes:
      label: APK flavor
      options:
        - compat
        - modern metadata-only
        - unknown
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and Android version
      placeholder: "Pixel 8, Android 15, API 35"
    validations:
      required: true
  - type: dropdown
    id: route
    attributes:
      label: Trigger route
      options:
        - Native UI
        - Engine API
        - Test-staged Docker CLI
        - ADB/debug receiver
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and logs
      description: Paste short, redacted logs. Attach larger logs as files.
      render: text
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I removed secrets from logs and screenshots.
          required: true
        - label: I checked the current STATUS/TODO/COMPATIBILITY docs.
          required: false
        - label: I noted whether this reproduces on build 20260505.1 or a newer commit.
          required: false
