name: Release readiness

on:
  pull_request:
    paths:
      - docs/build/**
      - docs/release/**
      - THIRD_PARTY_NOTICES.md
      - app/src/main/assets/oss-licenses/THIRD_PARTY_NOTICES.md
      - app/src/main/assets/pdockerd/**
      - app/src/main/jniLibs/**
      - app/src/compat/jniLibs/**
      - docker-proot-setup/bin/**
      - docker-proot-setup/docker-bin/**
      - docker-proot-setup/lib/**
      - metadata/fdroid/**
      - scripts/verify-release-readiness.py
      - .github/workflows/release-readiness.yml
  push:
    branches:
      - main
    paths:
      - docs/build/**
      - docs/release/**
      - THIRD_PARTY_NOTICES.md
      - app/src/main/assets/oss-licenses/THIRD_PARTY_NOTICES.md
      - app/src/main/assets/pdockerd/**
      - app/src/main/jniLibs/**
      - app/src/compat/jniLibs/**
      - docker-proot-setup/bin/**
      - docker-proot-setup/docker-bin/**
      - docker-proot-setup/lib/**
      - metadata/fdroid/**
      - scripts/verify-release-readiness.py
      - .github/workflows/release-readiness.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  host-only-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check source, secret, and payload readiness inventory
        run: python3 scripts/verify-release-readiness.py
